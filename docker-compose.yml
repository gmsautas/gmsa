services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gmsa_user
      POSTGRES_PASSWORD: gmsa_password
      POSTGRES_DB: gmsa_db
    ports:
      - "5432:5432"
    volumes:
      - gmsa_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmsa_user -d gmsa_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://gmsa_user:gmsa_password@db:5432/gmsa_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  gmsa_db_data:
